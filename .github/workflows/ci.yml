# Triggers: push to any branch, pull requests to main
# CI: runs all tests and blocks PR merge if they fail
# CD: builds and uploads a Python wheel artifact when merged to main

name: EnterpriseIQ CI/CD Pipeline

on:
  push:
    branches:
      - '**'        # Triggers on push to ANY branch
  pull_request:
    branches:
      - main        # Triggers on PRs targeting main

jobs:

  # ─────────────────────────────────────────────────────────
  # JOB 1: CI — Run all tests
  # Runs on every push and every PR to main
  # ─────────────────────────────────────────────────────────
  test:
    name: Run All Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Assignment 10 — Creational Pattern Tests
        run: |
          pytest tests/test_all.py -v --tb=short

      - name: Run Assignment 11 — Repository Layer Tests
        run: |
          pytest tests/test_repositories.py -v --tb=short

      - name: Run Assignment 12 — Service Layer Tests
        run: |
          pytest tests/services/test_services.py -v --tb=short

      - name: Run Assignment 12 — API Integration Tests
        run: |
          pytest tests/api/test_api.py -v --tb=short

      - name: Generate coverage report
        run: |
          pytest tests/ \
            --cov=src \
            --cov=creational_patterns \
            --cov=repositories \
            --cov=services \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -q

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # JOB 2: CD — Build and upload release artifact
  # Only runs when code is merged/pushed to main
  # ─────────────────────────────────────────────────────────
  release:
    name: Build Release Artifact
    runs-on: ubuntu-latest
    needs: test                   # Only runs if test job passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build Python wheel package
        run: |
          python -m build --wheel --outdir dist/

      - name: Upload wheel as GitHub release artifact
        uses: actions/upload-artifact@v4
        with:
          name: enterpriseiq-wheel-${{ github.sha }}
          path: dist/*.whl
          retention-days: 30

      - name: Display build summary
        run: |
          echo "✅ Build successful!"
          echo "📦 Artifact: $(ls dist/*.whl)"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "🏷️  Branch: ${{ github.ref_name }}"
